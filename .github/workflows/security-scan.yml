name: Weekly Security Scan

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual runs

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          echo "## npm audit results" >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev 2>&1 | tee audit.txt || true
          cat audit.txt >> $GITHUB_STEP_SUMMARY

      - name: Check for outdated packages
        run: |
          echo "## Outdated packages" >> $GITHUB_STEP_SUMMARY
          npm outdated 2>&1 | tee outdated.txt || true
          cat outdated.txt >> $GITHUB_STEP_SUMMARY

      - name: Run Lighthouse security audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://www.vallotaventures.com
          runs: 1
          uploadArtifacts: true

      - name: Check security headers
        run: |
          echo "## Security Headers Check" >> $GITHUB_STEP_SUMMARY
          HEADERS=$(curl -sI https://www.vallotaventures.com)
          echo "$HEADERS" >> $GITHUB_STEP_SUMMARY

          # Check critical headers
          echo "$HEADERS" | grep -qi "strict-transport-security" && echo "HSTS: PASS" >> $GITHUB_STEP_SUMMARY || echo "HSTS: FAIL" >> $GITHUB_STEP_SUMMARY
          echo "$HEADERS" | grep -qi "x-content-type-options" && echo "X-Content-Type-Options: PASS" >> $GITHUB_STEP_SUMMARY || echo "X-Content-Type-Options: FAIL" >> $GITHUB_STEP_SUMMARY
          echo "$HEADERS" | grep -qi "x-frame-options" && echo "X-Frame-Options: PASS" >> $GITHUB_STEP_SUMMARY || echo "X-Frame-Options: FAIL" >> $GITHUB_STEP_SUMMARY
          echo "$HEADERS" | grep -qi "content-security-policy" && echo "CSP: PASS" >> $GITHUB_STEP_SUMMARY || echo "CSP: FAIL" >> $GITHUB_STEP_SUMMARY

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Scan Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly security scan found issues. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['security']
            });
